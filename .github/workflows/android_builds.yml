name: 🤖 Android Builds
on:
  workflow_call:
    secrets:
      SERVICE_ACCOUNT_KEY:
        required: true

  workflow_dispatch:

# Global Settings
env:
  SCONS_FLAGS: >-
    module_text_server_fb_enabled=yes
    swappy=yes

jobs:
  build-android:
    runs-on: ubuntu-24.04
    name: ${{ matrix.name }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Template arm64 (target=template_debug, arch=arm64)
            cache-name: android-template-arm64-debug
            target: template_debug
            instrumented_tests: true
            scons-flags: arch=arm64

          - name: Template arm64 (target=template_release, arch=arm64)
            cache-name: android-template-arm64-release
            target: template_release
            instrumented_tests: false
            scons-flags: arch=arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: ${{ matrix.cache-name }}
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      - name: Download Swappy
        run: python ./misc/scripts/install_swappy_android.py

      - name: Compilation
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONS_FLAGS }} ${{ matrix.scons-flags }} build_profile=profile.gdbuild progress=yes
          platform: android
          target: ${{ matrix.target }}

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: ${{ matrix.cache-name }}
        continue-on-error: true

      - name: Generate Godot templates
        if: matrix.target == 'template_debug' || matrix.target == 'template_release'
        run: |
          cd platform/android/java
          ./gradlew generateGodotTemplates
          cd ../../..
          ls -l bin/

      # Сохраняем папку bin для текущей матрицы
      - name: Cache compiled APKs for final packaging
        uses: actions/cache/save@v4
        with:
          path: bin/
          key: secret-bin-transfer-${{ github.run_id }}-${{ matrix.target }}

  # Создание точной структуры шаблонов без лишних папок
  package-all:
    runs-on: ubuntu-24.04
    needs: build-android
    steps:
      # Скачиваем исходный код репозитория для получения чистой структуры Gradle
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # Восстанавливаем скомпилированный Debug в отдельную папку
      - name: Restore Debug Files
        uses: actions/cache/restore@v4
        with:
          path: bin_debug/
          key: secret-bin-transfer-${{ github.run_id }}-${{ 'template_debug' }}

      # Восстанавливаем скомпилированный Release в другую папку
      - name: Restore Release Files
        uses: actions/cache/restore@v4
        with:
          path: bin_release/
          key: secret-bin-transfer-${{ github.run_id }}-${{ 'template_release' }}

      - name: Structure Template Directory
        run: |
          mkdir -p Godot_v4.6.3-templates
          

          cp bin_debug/android_debug.apk Godot_v4.6.3-templates/
          cp bin_release/android_release.apk Godot_v4.6.3-templates/
          
          # 3. Собираем чистый исходный код для android_source.zip
          # Используем файлы из platform/android/java исходного кода репозитория
          mkdir -p tmp_source_build
          cp -r platform/android/java/* tmp_source_build/
          
          # 4. Копируем обе собранные библиотеки (.aar) в папку libs будущего архива
          mkdir -p tmp_source_build/libs
          cp bin_debug/godot-lib.template_debug.aar tmp_source_build/libs/
          cp bin_release/godot-lib.template_release.aar tmp_source_build/libs/
          
          # 5. Упаковываем весь этот код внутрь архива android_source.zip
          cd tmp_source_build
          zip -r ../Godot_v4.6.3-templates/android_source.zip .
          cd ..
          
          # 6. Записываем версию в корень
          echo "4.6.3.stable" > Godot_v4.6.3-templates/version.txt
          
          # Очищаем временную папку сборки
          rm -rf tmp_source_build

      - name: Upload Final Archive
        uses: actions/upload-artifact@v4
        with:
          name: Godot_v4.6.3-templates
          path: Godot_v4.6.3-templates/
