name: 🤖 Android Builds
on:
  workflow_call:
    secrets:
      SERVICE_ACCOUNT_KEY:
        required: true
  workflow_dispatch:

env:
  SCONS_FLAGS: >-
    module_text_server_fb_enabled=yes
    swappy=yes

jobs:
  build-android:
    runs-on: ubuntu-24.04
    name: ${{ matrix.name }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Template arm64 (target=template_debug, arch=arm64)
            cache-name: android-template-arm64-debug
            target: template_debug
            scons-flags: arch=arm64

          - name: Template arm64 (target=template_release, arch=arm64)
            cache-name: android-template-arm64-release
            target: template_release
            scons-flags: arch=arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: ${{ matrix.cache-name }}
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      - name: Download Swappy
        run: python ./misc/scripts/install_swappy_android.py

      - name: Compilation
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONS_FLAGS }} ${{ matrix.scons-flags }} build_profile=profile.gdbuild progress=yes
          platform: android
          target: ${{ matrix.target }}

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: ${{ matrix.cache-name }}
        continue-on-error: true

      - name: Generate Godot templates
        run: |
          cd platform/android/java
          ./gradlew generateGodotTemplates

      - name: Upload Temporary Build
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: bin/

  package-all:
    runs-on: ubuntu-24.04
    needs: build-android
    # Разрешаем джобу удалять артефакты
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Debug Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-template_debug
          path: bin_debug

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-template_release
          path: bin_release

      - name: Structure Template Directory
        run: |
          mkdir -p Godot_v4.6.3-templates/tmp_source_build
          
          cp bin_debug/android_debug.apk Godot_v4.6.3-templates/
          cp bin_release/android_release.apk Godot_v4.6.3-templates/
          
          unzip bin_debug/android_source.zip -d Godot_v4.6.3-templates/tmp_source_build/
          
          mkdir -p Godot_v4.6.3-templates/tmp_source_build/libs/{debug,release}
          cp bin_debug/godot-lib.template_debug.aar Godot_v4.6.3-templates/tmp_source_build/libs/debug/
          cp bin_release/godot-lib.template_release.aar Godot_v4.6.3-templates/tmp_source_build/libs/release/
          
          cd Godot_v4.6.3-templates/tmp_source_build
          zip -r ../android_source.zip .
          cd ../..
          
          echo "4.6.3.stable" > Godot_v4.6.3-templates/version.txt
          rm -rf Godot_v4.6.3-templates/tmp_source_build

      - name: Upload Final Archive
        uses: actions/upload-artifact@v4
        with:
          name: Godot_v4.6.3-templates
          path: Godot_v4.6.3-templates/

      # ПРОСТОЕ УДАЛЕНИЕ В ОДНУ СТРОКУ
      - name: Delete Temporary Artifacts
        uses: geekyeggo/delete-artifact@v4
        with:
          name: |
            build-template_debug
            build-template_release
